<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carga en Cola de Productos - OLA</title>
  <link rel="stylesheet" href="FRONTEND_ESTILOS.css">
</head>
<body>
  <div class="container">
    
    <!-- ========== HEADER ========== -->
    <header class="header">
      <div class="header-content">
        <h1>📦 Carga Rápida de Productos</h1>
        <p>Crea múltiples productos y edítalos uno por uno en cola</p>
      </div>
    </header>

    <!-- ========== PASO 1: FORMULARIO DE CARGA RÁPIDA ========== -->
    <div id="quick-load-form">
      <h2>Paso 1: Ingresa datos básicos</h2>
      <p class="form-helper">Agrega solo nombre y descripción. Luego completa marca, variantes e imágenes en cola.</p>
      
      <div class="productos-input-container">
        <!-- Row 1 -->
        <div class="producto-row">
          <input type="text" class="nombre" placeholder="Nombre del producto *" required>
          <input type="text" class="descripcion" placeholder="Descripción (opcional)">
          <button class="btn-secondary" type="button" onclick="removeRow(this)">Eliminar</button>
        </div>
      </div>

      <!-- Agregar más filas -->
      <button type="button" class="btn-secondary" 
              style="width: 100%; margin-bottom: 20px; padding: 10px;"
              onclick="agregarFila()">
        + Agregar otro producto
      </button>

      <!-- Botones principales -->
      <div class="form-buttons-quick">
        <button type="button" class="btn-secondary" onclick="limpiarFormulario()">Limpiar</button>
        <button type="button" class="btn-primary" onclick="cargarProductosRapido()">
          ✓ Cargar Productos
        </button>
      </div>
    </div>

    <!-- ========== PASO 2: RESUMEN DE CARGA ========== -->
    <div id="load-summary"></div>

    <!-- ========== PASO 3: EDITOR EN COLA ========== -->
    <div id="queue-editor">
      <!-- Header con progreso -->
      <!-- Se renderiza dinámicamente -->

      <!-- Tarjeta del producto -->
      <div id="product-card"></div>

      <!-- Pie con navegación -->
      <div class="queue-footer">
        <button class="btn-secondary" onclick="productoAnterior()">← Anterior</button>
        <button class="btn-secondary" onclick="saltarProducto()">Saltar</button>
        <button class="btn-primary" onclick="siguienteProducto()">Guardar y Siguiente →</button>
      </div>
    </div>

    <!-- ========== PASO 4: MENSAJE DE FINALIZACIÓN ========== -->
    <div id="completion-message"></div>

  </div>

  <!-- Scripts -->
  <script src="FRONTEND_EJEMPLO.js"></script>

  <script>
    // Agregar funciones de utilidad que podrían faltar

    function agregarFila() {
      const container = document.querySelector('.productos-input-container');
      const nuevaFila = document.createElement('div');
      nuevaFila.className = 'producto-row';
      nuevaFila.innerHTML = `
        <input type="text" class="nombre" placeholder="Nombre del producto *" required>
        <input type="text" class="descripcion" placeholder="Descripción (opcional)">
        <button class="btn-secondary" type="button" onclick="removeRow(this)">Eliminar</button>
      `;
      container.appendChild(nuevaFila);
    }

    function removeRow(button) {
      const rows = document.querySelectorAll('.producto-row');
      if (rows.length > 1) {
        button.parentElement.remove();
      } else {
        alert('Debes tener al menos un producto');
      }
    }

    function limpiarFormulario() {
      document.querySelectorAll('.producto-row input').forEach(input => input.value = '');
      // Dejar solo una fila
      const rows = document.querySelectorAll('.producto-row');
      for (let i = 1; i < rows.length; i++) {
        rows[i].remove();
      }
    }
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica',
        'Arial', sans-serif;
      background: #f3f4f6;
      color: #1f2937;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 20px;
      border-radius: 12px;
      margin-bottom: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 16px;
      opacity: 0.9;
    }

    .form-helper {
      color: var(--text-light);
      font-size: 13px;
      margin-bottom: 20px;
      padding: 12px;
      background: var(--bg-light);
      border-left: 3px solid var(--primary);
      border-radius: 4px;
    }

    .productos-input-container {
      margin-bottom: 20px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header {
        padding: 30px 20px;
      }

      .header h1 {
        font-size: 24px;
      }

      .header p {
        font-size: 14px;
      }
    }
  </style>

</body>
</html>

<!--
CÓMO USAR ESTE ARCHIVO:

1. Coloca este HTML en tu carpeta frontend/pages/
2. Importa los estilos CSS que creamos
3. Importa el JavaScript con las funciones
4. Asegúrate de tener un token auth guardado en localStorage bajo 'authToken'

5. Mapea la ruta en tu aplicación:
   - /carga-productos-cola → este archivo

6. El flujo es automático:
   Paso 1: Usuario ingresa datos básicos
         ↓
   Paso 2: Backend crea productos vacíos
         ↓
   Paso 3: Se muestra resumen
         ↓
   Paso 4: Usuario hace click "Editar en Cola"
         ↓
   Paso 5: Tarjeta 1 (completa marca, variantes, imágenes)
         ↓
   Paso 6: Click "Siguiente" → Tarjeta 2
         ↓
   Paso 7: ... hasta completar todos
         ↓
   Paso 8: Mensaje de éxito

EJEMPLO DE TOKEN:
Si usas JWT, guarda así en login:
localStorage.setItem('authToken', jwtToken);
-->
